name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  php-standards:
    name: PHP coding standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress

      - name: PHPCS (WordPress Coding Standards)
        run: vendor/bin/phpcs

  php-compat:
    name: PHP 7.4 syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none

      - name: Lint all PHP files on the minimum supported PHP
        run: |
          find . \( -path ./vendor -o -path ./node_modules \) -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

  assets:
    name: JS/CSS lint, build and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint styles
        run: npm run lint:css

      - name: Build
        run: npm run build

      - name: Package plugin zip
        run: npm run plugin-zip

      - name: Upload installable zip
        uses: actions/upload-artifact@v4
        with:
          name: noorblocks
          path: noorblocks.zip
